<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <title>Demand Planning Control Room</title>
    <base href="/">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0b0d12">
    <script>
      (() => {
        try {
          const saved = localStorage.getItem('theme');
          const dark = saved ? saved === 'dark' : matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.classList.toggle('dark', dark);
        } catch { /* Theme preference is optional. */ }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <!-- Font cho DevLog Lab: JetBrains Mono (tiêu đề/mã) + Inter (diễn giải); display=swap tránh FOIT. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600;700&display=swap">
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
