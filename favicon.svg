  <circle cx="70" cy="35" r="5" fill="#F472B6" />
  <path d="M 30 45 L 50 25 L 70 35" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.8" />
